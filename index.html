<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Đổi Link Shopee 25%</title>
</head>

<body style="font-family:sans-serif;text-align:center;padding:40px;background:#f5f5f5;">

<h2>Tool Đổi Link Shopee 25%</h2>

<input type="text" id="link" placeholder="Dán link Shopee vào đây" style="width:80%;padding:10px;">
<br><br>

<button onclick="convert()" style="padding:10px 20px;">Đổi Link</button>

<p id="result" style="margin-top:20px;color:red;"></p>

<script>
function convert() {
var link = document.getElementById("link").value;
if(link === "") {
document.getElementById("result").innerHTML = "Vui lòng nhập link";
} else {
document.getElementById("result").innerHTML = link;
}
}
</script>

</body>
</html>
